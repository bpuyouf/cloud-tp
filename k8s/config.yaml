apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "mydb"
  PORT: "3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  # Base64 encoded values - replace with actual encoded values
  DB_USER: dXNlcg==  # 'user' base64 encoded
  DB_PASS: cGFzc3dvcmQ=  # 'password' base64 encoded